name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    # NOTE: do NOT add `**.jpg` / `**.png` to paths-ignore — the smoke test
    # classifies the baked-in images/unknown.jpg fixture, and changes to the
    # fixture must retrigger CI so the assertion is re-evaluated.
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.gif'
      - '**.svg'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c0043e486fb448a8bb # v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Lint workflows
        run: make lint-ci

      - name: Secret scan
        run: make secrets

      - name: Trivy filesystem scan
        run: make trivy-fs

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c0043e486fb448a8bb # v6
        with:
          go-version: '1.26.2'
          cache: true

      # Runs `make test` scoped to pure-Go packages (internal/entity) —
      # the internal/usecases package transitively imports go-face (dlib
      # C bindings) and cannot compile on a host without the C toolchain.
      # Full internal/... with CGO runs inside the builder image as part
      # of the docker job's GATE 1 (build-for-scan).
      - name: Unit tests
        run: make test

  integration-test:
    needs: [static-check, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read    # pull upstream go-face/dlib20 builder from GHCR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lowercase repository owner
        shell: bash
        env:
          OWNER: '${{ github.repository_owner }}'
        run: |
          echo "OWNER_LC=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"

      # `make integration-test` pulls the BUILDER_IMAGE (public GHCR
      # package) and runs go test -tags integration -race inside it.
      - name: Integration test
        run: make integration-test

  e2e-compose:
    needs: [static-check, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: E2E through docker-compose
        run: make e2e-compose

  docker:
    needs: [static-check, test]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write       # registry push to GHCR (only exercised on tag pushes)
      id-token: write       # cosign keyless OIDC (Sigstore Fulcio — only exercised on tag pushes)

    # ----------------------------------------------------------------
    # Matrix: build, scan, smoke-test, publish, and sign the image
    # against EVERY supported dlib-docker major lineage that upstream
    # go-face publishes. A regression in either lineage is caught on
    # the commit that introduced it.
    #
    # Primary lineage (unsuffixed tags → `latest`): dlib20.
    # Non-primary lineage publishes suffixed tags (e.g. `1.2.3-dlib19`).
    #
    # `fail-fast: false` so dlib19 and dlib20 fail independently.
    # Cache scope is per-lineage so layers don't evict each other.
    # ----------------------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        include:
          - dlib_major: '20'
            suffix: ''
            primary: true
            builder: 'ghcr.io/andriykalashnykov/go-face/dlib20:0.1.4@sha256:c30c97c5d5a664d5f711f17d81a65d9558e17eeb73c0d7a76ff8dc11f6d1d958'
          - dlib_major: '19'
            suffix: '-dlib19'
            primary: false
            builder: 'ghcr.io/andriykalashnykov/go-face/dlib19:0.1.4@sha256:4711c37c29f7af3623297b8a28fa135ed7f7e001d5688661916921bde7948c51'

    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Lowercase repository owner
        shell: bash
        env:
          OWNER: '${{ github.repository_owner }}'
        run: |
          echo "OWNER_LC=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/go-face-recognition
          # Primary cell (dlib20) owns unsuffixed tags + `latest`.
          # Non-primary cells append their suffix to every tag, incl. `latest`
          # (so the dlib19 cell publishes `latest-dlib19`, not a bare `latest`).
          # Blank second flavor line for the primary cell is a harmless no-op.
          flavor: |
            latest=${{ matrix.primary && startsWith(github.ref, 'refs/tags/') }}
            ${{ matrix.suffix && format('suffix={0},onlatest=true', matrix.suffix) || '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.vendor=Andriy Kalashnykov - andriykalashnykov@gmail.com
            org.opencontainers.image.title=Face recognition in Go with Dlib
            org.opencontainers.image.description=Face recognition in Go with Dlib
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ github.ref_name }}
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/AndriyKalashnykov/go-face-recognition/main/README.md
            io.artifacthub.package.maintainers=[{\"name\":\"Andriy Kalashnykov\",\"email\":\"andriykalashnykov@gmail.com\"}]
            io.artifacthub.package.license=MIT

      # ----------------------------------------------------------------
      # GATE 1: Single-arch load-local build (every push, per matrix cell).
      # Loads the image into the local Docker daemon so the Trivy image
      # scan and smoke test can exercise a real, built image. Scan tag is
      # cell-scoped so concurrent matrix cells don't overwrite each other.
      # Cache scope is per-lineage to prevent dlib19/dlib20 layer eviction.
      # ----------------------------------------------------------------
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile.go-face
          platforms: linux/amd64
          load: true
          tags: go-face-recognition:scan-dlib${{ matrix.dlib_major }}
          build-args: |
            BUILDER_IMAGE=${{ matrix.builder }}
          cache-from: type=gha,scope=dlib${{ matrix.dlib_major }}
          cache-to: type=gha,mode=max,scope=dlib${{ matrix.dlib_major }}

      # ----------------------------------------------------------------
      # GATE 2: Trivy image scan — CRITICAL/HIGH blocking (every push).
      # Catches CVEs in the base image and OS packages that filesystem
      # scans cannot see. `ignore-unfixed: true` skips CVEs with no
      # upstream fix yet.
      # ----------------------------------------------------------------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'go-face-recognition:scan-dlib${{ matrix.dlib_major }}'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # ----------------------------------------------------------------
      # GATE 3: Smoke test (every push).
      # This project is a CLI tool, not an HTTP service — no port/health
      # endpoint to probe. Instead we run the binary against the baked-in
      # persons/ and images/ test data. Exit 0 means the binary loaded
      # dlib successfully, parsed the test images, and wrote result.jpg.
      # Wrapped in `timeout 60s` as a safety net.
      # ----------------------------------------------------------------
      - name: Smoke test
        run: |
          set -euo pipefail
          timeout 60s docker run --name=smoke-test-dlib${{ matrix.dlib_major }} --rm \
            --entrypoint /app/main \
            go-face-recognition:scan-dlib${{ matrix.dlib_major }}

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test-dlib${{ matrix.dlib_major }} 2>/dev/null || true

      # ----------------------------------------------------------------
      # GATE 3b: container-structure-test (every push).
      # Asserts runtime contract: entrypoint shape, labels, non-root
      # UID 10001, binary permissions, required /app subtree present,
      # statically-linked ELF. Catches rebase / upstream builder drift
      # that a vulnerability scan would miss.
      # ----------------------------------------------------------------
      - name: Install container-structure-test
        env:
          CST_VERSION: 'v1.22.1'
        run: |
          set -euo pipefail
          curl -fsSL --proto '=https' --tlsv1.2 -o /tmp/cst \
            "https://storage.googleapis.com/container-structure-test/${CST_VERSION}/container-structure-test-linux-amd64"
          install -m 755 /tmp/cst /usr/local/bin/container-structure-test
          container-structure-test version

      - name: Container structure test
        run: |
          container-structure-test test \
            --image go-face-recognition:scan-dlib${{ matrix.dlib_major }} \
            --config container-structure-test.yaml

      # ----------------------------------------------------------------
      # GATE 4: Multi-arch build. ALWAYS runs (catches arm64/arm/v7
      # cross-compile regressions on the commit that introduced them).
      # Push is conditional: validation-only on non-tag pushes, actual
      # publish on tag pushes. Login is tag-gated at step level.
      # ----------------------------------------------------------------
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile.go-face
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            BUILDER_IMAGE=${{ matrix.builder }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          # Pattern A (default): no in-manifest provenance/SBOM, so the
          # GHCR "OS / Arch" tab renders cleanly. Supply-chain verification
          # is covered by the cosign keyless OIDC signature at GATE 5.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dlib${{ matrix.dlib_major }}
          cache-to: type=gha,mode=max,scope=dlib${{ matrix.dlib_major }}

      # ----------------------------------------------------------------
      # GATE 5: Cosign keyless OIDC signing — tag-only.
      # No long-lived keys — uses GitHub OIDC → Sigstore Fulcio → Rekor.
      # Signs by manifest digest (not tag) so a race with another build
      # cannot substitute a different image under the same tag between
      # push and sign.
      # ----------------------------------------------------------------
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      # ----------------------------------------------------------------
      # GATE 6: SBOM attestation — tag-only, out-of-band.
      # Generates a SPDX SBOM via Syft and attaches it to the image
      # digest as a Sigstore `cosign attest` attestation. Does NOT
      # embed the SBOM in the image manifest (which would break the
      # GHCR "OS / Arch" tab rendering — see Pattern A comment above
      # the Build and push step). Consumers verify with:
      #   cosign verify-attestation \
      #     --type spdxjson \
      #     --certificate-identity-regexp \
      #       'https://github\.com/AndriyKalashnykov/go-face-recognition/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     ghcr.io/.../go-face-recognition@<digest>
      # ----------------------------------------------------------------
      - name: Install Syft
        if: startsWith(github.ref, 'refs/tags/')
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate and attest SBOM
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          # Use the first tag as the image reference for syft — syft
          # only needs to pull the manifest; cosign attaches the
          # attestation to the digest (same digest for every tag).
          first_tag=$(echo "${TAGS}" | head -1)
          echo "→ syft ${first_tag}@${DIGEST} → /tmp/sbom.spdx.json"
          syft "${first_tag}@${DIGEST}" -o spdx-json > /tmp/sbom.spdx.json
          echo "SBOM byte size: $(stat -c '%s' /tmp/sbom.spdx.json)"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign attest ${tag}@${DIGEST} (SPDX SBOM)"
            cosign attest --yes \
              --predicate /tmp/sbom.spdx.json \
              --type spdxjson \
              "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # ==================================================================
  # release-artifacts-extract — tag-gated
  #
  # Extracts the compiled /app/main binary and its required baked-in
  # data directories (fonts/, models/, persons/, images/) from every
  # per-platform manifest of every published matrix lineage image, and
  # packages them as deterministic reproducible tarballs:
  #
  #   go-face-recognition_<version>_linux_amd64[-dlib19].tar.gz
  #   go-face-recognition_<version>_linux_arm64[-dlib19].tar.gz
  #   go-face-recognition_<version>_linux_armv7[-dlib19].tar.gz
  #
  # Six tarballs total per tag (2 lineages × 3 platforms). Each
  # tarball is self-contained — it includes the binary, all data
  # files needed to run the example pipeline, LICENSE, and a short
  # USAGE note. Users extract + `./main` to classify faces in the
  # baked-in images/unknown.jpg without needing Docker.
  #
  # Per-lineage matrix: one cell per dlib major. QEMU binfmt handlers
  # are installed so `docker create --platform linux/<arch>` can pull
  # + stage arm64 and arm/v7 manifests on an amd64 runner.
  #
  # Tarballs are uploaded as ephemeral workflow artifacts and
  # downloaded by the release-artifacts-publish job for aggregation +
  # checksum + cosign signing.
  # ==================================================================
  release-artifacts-extract:
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read    # checkout for LICENSE
      packages: read    # pull from GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - dlib_major: '20'
            suffix: ''
          - dlib_major: '19'
            suffix: '-dlib19'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lowercase repository owner
        shell: bash
        env:
          OWNER: '${{ github.repository_owner }}'
        run: |
          echo "OWNER_LC=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')" >>"${GITHUB_ENV}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract per-platform tarballs
        env:
          REF_NAME: ${{ github.ref_name }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail

          # Strip leading 'v' from vX.Y.Z → X.Y.Z (matches the
          # metadata-action {{version}} pattern used by the docker job).
          VERSION="${REF_NAME#v}"
          IMAGE="ghcr.io/${OWNER_LC}/go-face-recognition:${VERSION}${SUFFIX}"

          echo "=== source image: ${IMAGE} ==="
          docker buildx imagetools inspect "${IMAGE}" >/dev/null

          mkdir -p artifacts

          # (docker platform, asset-name arch suffix)
          PLATFORMS=(
            "linux/amd64 amd64"
            "linux/arm64 arm64"
            "linux/arm/v7 armv7"
          )

          for entry in "${PLATFORMS[@]}"; do
            read -r DOCKER_PLATFORM ASSET_ARCH <<< "${entry}"
            echo
            echo "=== extracting ${DOCKER_PLATFORM} ==="

            docker pull --platform "${DOCKER_PLATFORM}" --quiet "${IMAGE}"

            CID=$(docker create --platform "${DOCKER_PLATFORM}" "${IMAGE}")
            trap 'docker rm -f "${CID}" >/dev/null 2>&1 || true' EXIT

            STAGE="go-face-recognition-${VERSION}${SUFFIX}"
            rm -rf "${STAGE}"
            mkdir -p "${STAGE}"

            # Core binary + baked-in test data.
            docker cp "${CID}:/app/main"    "${STAGE}/main"
            docker cp "${CID}:/app/fonts"   "${STAGE}/fonts"
            docker cp "${CID}:/app/models"  "${STAGE}/models"
            docker cp "${CID}:/app/persons" "${STAGE}/persons"
            docker cp "${CID}:/app/images"  "${STAGE}/images"

            docker rm -f "${CID}" >/dev/null
            trap - EXIT

            # Repo-provided artifacts (at this tag commit).
            cp LICENSE "${STAGE}/"
            cp README.md "${STAGE}/"

            # Short usage note so curl-and-tar users have instant
            # onboarding without grep'ing README.
            cat > "${STAGE}/USAGE.md" <<USAGE
          # go-face-recognition ${VERSION}${SUFFIX} (${DOCKER_PLATFORM})

          This tarball contains a statically-linked go-face-recognition
          binary plus all data files required to run the example
          classification pipeline out of the box. No Docker, no CGo
          toolchain, no dlib system package needed on the host — the
          binary is linked against a \`libdlib.a\` static archive from
          upstream \`ghcr.io/andriykalashnykov/dlib-docker\`.

          Run the baked-in example:

              ./main

          It will load every subdirectory of \`persons/\` as a labeled
          identity, detect + classify faces in \`images/unknown.jpg\`,
          and write an annotated \`images/result.jpg\`.

          To run against your own data, replace the contents of
          \`persons/\` and \`images/unknown.jpg\` before invoking
          \`./main\`. The \`models/\` directory holds the pre-trained
          dlib ResNet + shape-predictor weights and should not be
          modified.

          See https://github.com/AndriyKalashnykov/go-face-recognition
          for full documentation.
          USAGE

            # Deterministic, reproducible tarball:
            #   --sort=name      stable file ordering
            #   --owner=0 --group=0 --numeric-owner  zeroed ownership
            #   --mtime=@0       zero mtimes (Unix epoch)
            #   gzip -n          strip gzip header timestamp + filename
            #
            # This lets downstream consumers re-extract from the image
            # digest and verify sha256 matches checksums.txt byte-for-byte.
            TARBALL="artifacts/go-face-recognition_${VERSION}_linux_${ASSET_ARCH}${SUFFIX}.tar.gz"
            tar --sort=name \
                --owner=0 --group=0 --numeric-owner \
                --mtime='@0' \
                -C "$(dirname "${STAGE}")" \
                -cf - "$(basename "${STAGE}")" \
              | gzip -n > "${TARBALL}"

            rm -rf "${STAGE}"
            echo "built ${TARBALL} ($(stat -c '%s' "${TARBALL}") bytes)"
          done

          echo
          echo "=== tarballs for lineage dlib${{ matrix.dlib_major }} ==="
          find artifacts -maxdepth 1 -type f -printf '%s\t%p\n'

      - name: Upload lineage tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-tarballs-dlib${{ matrix.dlib_major }}
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ==================================================================
  # release-artifacts-publish — tag-gated
  #
  # Downloads every tarball from every lineage of release-artifacts-
  # extract, produces a single checksums.txt covering all 6 tarballs,
  # cosign-blob-signs the checksums file with GitHub OIDC keyless
  # signing (same chain of trust as the image signing above), creates
  # a GitHub Release if one does not already exist for this tag, and
  # uploads everything.
  #
  # Users verify with:
  #   curl -LO .../checksums.txt.pem .../checksums.txt.sig .../checksums.txt
  #   cosign verify-blob \
  #     --certificate checksums.txt.pem \
  #     --signature   checksums.txt.sig \
  #     --certificate-identity-regexp 'https://github\.com/AndriyKalashnykov/go-face-recognition/.+' \
  #     --certificate-oidc-issuer    https://token.actions.githubusercontent.com \
  #     checksums.txt
  #   sha256sum -c checksums.txt --ignore-missing
  # ==================================================================
  release-artifacts-publish:
    needs: [release-artifacts-extract]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # gh release create + upload
      id-token: write   # cosign keyless OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all lineage tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-tarballs-*
          merge-multiple: true
          path: artifacts

      - name: Generate checksums
        working-directory: artifacts
        run: |
          set -euo pipefail
          # LC_ALL=C sort keeps the ordering stable across locales.
          sha256sum -- ./*.tar.gz | LC_ALL=C sort > checksums.txt
          # Strip the leading ./ from filenames so the checksum file
          # matches the plain names users get after `curl -LO`.
          sed -i 's| \./| |' checksums.txt
          echo
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign checksums with cosign
        working-directory: artifacts
        run: |
          set -euo pipefail
          # cosign v3.x deprecates the legacy dual-file
          # (.sig + .pem) output in favour of a single bundle file
          # that packages signature, certificate, and rekor entry
          # together. Use the new format — it's the only flow cosign
          # 3.x officially supports with --signing-config, and it
          # simplifies the consumer's verify step from three files
          # to one. `cosign verify-blob --bundle` has been available
          # since cosign 2.x, so this is backward-compatible with
          # any modern cosign installation.
          cosign sign-blob --yes \
            --bundle checksums.txt.sigstore.json \
            checksums.txt
          echo
          echo "=== signed release bundle ==="
          ls -la

      - name: Create or publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # Three-way state machine: missing / draft / published.
          #
          # `gh release view` finds DRAFT releases as well as published
          # ones. Deleting a git tag that has a published release demotes
          # the release to draft state (GitHub behavior, not reversible
          # via a subsequent tag push), so a naive "skip if view succeeds"
          # check leaves the release stuck as a permanent draft invisible
          # to shields.io and anonymous GitHub UI consumers. Seen in
          # dlib-docker on 2026-04-11 after the libdlib.a fix re-cut
          # v19.24.9 + v20.0.1 — see CLAUDE.md "GHCR package cleanup —
          # gotchas" for the full post-mortem.
          #
          # Fix: inspect .isDraft explicitly and promote drafts.
          existing=$(gh release view "${TAG}" --repo "${{ github.repository }}" \
            --json isDraft --jq '.isDraft' 2>/dev/null || echo missing)
          case "${existing}" in
            missing)
              echo "No release for ${TAG} — creating one"
              gh release create "${TAG}" \
                --repo "${{ github.repository }}" \
                --verify-tag \
                --generate-notes \
                --title "${TAG}"
              ;;
            false)
              echo "Published release for ${TAG} already exists — will upload assets to it"
              ;;
            true)
              echo "Draft release for ${TAG} exists (leftover from a tag re-push) — promoting to published"
              gh release edit "${TAG}" --repo "${{ github.repository }}" --draft=false
              ;;
          esac

      - name: Upload release assets
        working-directory: artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          gh release upload "${TAG}" \
            --repo "${{ github.repository }}" \
            --clobber \
            -- \
            ./*.tar.gz checksums.txt checksums.txt.sigstore.json
          echo
          echo "=== release assets uploaded to ${TAG} ==="
          gh release view "${TAG}" --repo "${{ github.repository }}" \
            --json assets --jq '.assets[] | "\(.name) (\(.size) bytes)"'

  # ==================================================================
  # ci-pass — single aggregator gate for branch protection.
  # Branch protection references THIS job only. It passes iff every
  # upstream job succeeded (or was skipped by its own `if:`). Adding a
  # new upstream job requires adding it to `needs:` below — there is no
  # drift risk from renaming matrix cells (they don't appear here).
  # ==================================================================
  ci-pass:
    if: always()
    needs: [static-check, test, integration-test, e2e-compose, docker, release-artifacts-extract, release-artifacts-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify no upstream job failed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          set -euo pipefail
          echo "Upstream job results: ${RESULTS}"
          if echo "${RESULTS}" | grep -Eq '"(failure|cancelled)"'; then
            echo "ERROR: at least one upstream job failed or was cancelled"
            exit 1
          fi
          echo "All upstream jobs passed (or were legitimately skipped)."
