name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write       # registry push to GHCR (only exercised on tag pushes)
      id-token: write       # cosign keyless OIDC (Sigstore Fulcio — only exercised on tag pushes)

    # ----------------------------------------------------------------
    # Matrix: build, scan, smoke-test, publish, and sign the image
    # against EVERY supported dlib-docker major lineage that upstream
    # go-face publishes. A regression in either lineage is caught on
    # the commit that introduced it.
    #
    # Primary lineage (unsuffixed tags → `latest`): dlib20.
    # Non-primary lineage publishes suffixed tags (e.g. `1.2.3-dlib19`).
    #
    # `fail-fast: false` so dlib19 and dlib20 fail independently.
    # Cache scope is per-lineage so layers don't evict each other.
    # ----------------------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        include:
          - dlib_major: '20'
            suffix: ''
            primary: true
            builder: 'ghcr.io/andriykalashnykov/go-face/dlib20:0.1.4@sha256:c30c97c5d5a664d5f711f17d81a65d9558e17eeb73c0d7a76ff8dc11f6d1d958'
          - dlib_major: '19'
            suffix: '-dlib19'
            primary: false
            builder: 'ghcr.io/andriykalashnykov/go-face/dlib19:0.1.4@sha256:4711c37c29f7af3623297b8a28fa135ed7f7e001d5688661916921bde7948c51'

    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Convert owner to lower case
        shell: bash
        env:
          OWNER: '${{ github.repository_owner }}'
        run: |
          echo "OWNER_LC=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/go-face-recognition
          # Primary cell (dlib20) owns unsuffixed tags + `latest`.
          # Non-primary cells append their suffix to every tag, incl. `latest`
          # (so the dlib19 cell publishes `latest-dlib19`, not a bare `latest`).
          # Blank second flavor line for the primary cell is a harmless no-op.
          flavor: |
            latest=${{ matrix.primary && startsWith(github.ref, 'refs/tags/') }}
            ${{ matrix.suffix && format('suffix={0},onlatest=true', matrix.suffix) || '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.vendor=Andriy Kalashnykov - andriykalashnykov@gmail.com
            org.opencontainers.image.title=Face recognition in Go with Dlib
            org.opencontainers.image.description=Face recognition in Go with Dlib
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ github.ref_name }}
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/AndriyKalashnykov/go-face-recognition/main/README.md
            io.artifacthub.package.maintainers=[{\"name\":\"Andriy Kalashnykov\",\"email\":\"andriykalashnykov@gmail.com\"}]
            io.artifacthub.package.license=MIT

      # ----------------------------------------------------------------
      # GATE 1: Single-arch load-local build (every push, per matrix cell).
      # Loads the image into the local Docker daemon so the Trivy image
      # scan and smoke test can exercise a real, built image. Scan tag is
      # cell-scoped so concurrent matrix cells don't overwrite each other.
      # Cache scope is per-lineage to prevent dlib19/dlib20 layer eviction.
      # ----------------------------------------------------------------
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile.go-face
          platforms: linux/amd64
          load: true
          tags: go-face-recognition:scan-dlib${{ matrix.dlib_major }}
          build-args: |
            BUILDER_IMAGE=${{ matrix.builder }}
          cache-from: type=gha,scope=dlib${{ matrix.dlib_major }}
          cache-to: type=gha,mode=max,scope=dlib${{ matrix.dlib_major }}

      # ----------------------------------------------------------------
      # GATE 2: Trivy image scan — CRITICAL/HIGH blocking (every push).
      # Catches CVEs in the base image and OS packages that filesystem
      # scans cannot see. `ignore-unfixed: true` skips CVEs with no
      # upstream fix yet.
      # ----------------------------------------------------------------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'go-face-recognition:scan-dlib${{ matrix.dlib_major }}'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # ----------------------------------------------------------------
      # GATE 3: Smoke test (every push).
      # This project is a CLI tool, not an HTTP service — no port/health
      # endpoint to probe. Instead we run the binary against the baked-in
      # persons/ and images/ test data. Exit 0 means the binary loaded
      # dlib successfully, parsed the test images, and wrote result.jpg.
      # Wrapped in `timeout 60s` as a safety net.
      # ----------------------------------------------------------------
      - name: Smoke test
        run: |
          set -euo pipefail
          timeout 60s docker run --name=smoke-test-dlib${{ matrix.dlib_major }} --rm \
            --entrypoint /app/main \
            go-face-recognition:scan-dlib${{ matrix.dlib_major }}

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test-dlib${{ matrix.dlib_major }} 2>/dev/null || true

      # ----------------------------------------------------------------
      # GATE 4: Multi-arch build. ALWAYS runs (catches arm64/arm/v7
      # cross-compile regressions on the commit that introduced them).
      # Push is conditional: validation-only on non-tag pushes, actual
      # publish on tag pushes. Login is tag-gated at step level.
      # ----------------------------------------------------------------
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile.go-face
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            BUILDER_IMAGE=${{ matrix.builder }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dlib${{ matrix.dlib_major }}
          cache-to: type=gha,mode=max,scope=dlib${{ matrix.dlib_major }}

      # ----------------------------------------------------------------
      # GATE 5: Cosign keyless OIDC signing — tag-only.
      # No long-lived keys — uses GitHub OIDC → Sigstore Fulcio → Rekor.
      # Signs by manifest digest (not tag) so a race with another build
      # cannot substitute a different image under the same tag between
      # push and sign.
      # ----------------------------------------------------------------
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # ==================================================================
  # release-artifacts-extract — tag-gated
  #
  # Extracts the compiled /app/main binary and its required baked-in
  # data directories (fonts/, models/, persons/, images/) from every
  # per-platform manifest of every published matrix lineage image, and
  # packages them as deterministic reproducible tarballs:
  #
  #   go-face-recognition_<version>_linux_amd64[-dlib19].tar.gz
  #   go-face-recognition_<version>_linux_arm64[-dlib19].tar.gz
  #   go-face-recognition_<version>_linux_armv7[-dlib19].tar.gz
  #
  # Six tarballs total per tag (2 lineages × 3 platforms). Each
  # tarball is self-contained — it includes the binary, all data
  # files needed to run the example pipeline, LICENSE, and a short
  # USAGE note. Users extract + `./main` to classify faces in the
  # baked-in images/unknown.jpg without needing Docker.
  #
  # Per-lineage matrix: one cell per dlib major. QEMU binfmt handlers
  # are installed so `docker create --platform linux/<arch>` can pull
  # + stage arm64 and arm/v7 manifests on an amd64 runner.
  #
  # Tarballs are uploaded as ephemeral workflow artifacts and
  # downloaded by the release-artifacts-publish job for aggregation +
  # checksum + cosign signing.
  # ==================================================================
  release-artifacts-extract:
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read    # checkout for LICENSE
      packages: read    # pull from GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - dlib_major: '20'
            suffix: ''
          - dlib_major: '19'
            suffix: '-dlib19'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Convert owner to lower case
        shell: bash
        env:
          OWNER: '${{ github.repository_owner }}'
        run: |
          echo "OWNER_LC=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')" >>"${GITHUB_ENV}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Log in to GHCR (pull)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract per-platform tarballs
        env:
          REF_NAME: ${{ github.ref_name }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail

          # Strip leading 'v' from vX.Y.Z → X.Y.Z (matches the
          # metadata-action {{version}} pattern used by the docker job).
          VERSION="${REF_NAME#v}"
          IMAGE="ghcr.io/${OWNER_LC}/go-face-recognition:${VERSION}${SUFFIX}"

          echo "=== source image: ${IMAGE} ==="
          docker buildx imagetools inspect "${IMAGE}" >/dev/null

          mkdir -p artifacts

          # (docker platform, asset-name arch suffix)
          PLATFORMS=(
            "linux/amd64 amd64"
            "linux/arm64 arm64"
            "linux/arm/v7 armv7"
          )

          for entry in "${PLATFORMS[@]}"; do
            read -r DOCKER_PLATFORM ASSET_ARCH <<< "${entry}"
            echo
            echo "=== extracting ${DOCKER_PLATFORM} ==="

            docker pull --platform "${DOCKER_PLATFORM}" --quiet "${IMAGE}"

            CID=$(docker create --platform "${DOCKER_PLATFORM}" "${IMAGE}")
            trap 'docker rm -f "${CID}" >/dev/null 2>&1 || true' EXIT

            STAGE="go-face-recognition-${VERSION}${SUFFIX}"
            rm -rf "${STAGE}"
            mkdir -p "${STAGE}"

            # Core binary + baked-in test data.
            docker cp "${CID}:/app/main"    "${STAGE}/main"
            docker cp "${CID}:/app/fonts"   "${STAGE}/fonts"
            docker cp "${CID}:/app/models"  "${STAGE}/models"
            docker cp "${CID}:/app/persons" "${STAGE}/persons"
            docker cp "${CID}:/app/images"  "${STAGE}/images"

            docker rm -f "${CID}" >/dev/null
            trap - EXIT

            # Repo-provided artifacts (at this tag commit).
            cp LICENSE "${STAGE}/"
            cp README.md "${STAGE}/"

            # Short usage note so curl-and-tar users have instant
            # onboarding without grep'ing README.
            cat > "${STAGE}/USAGE.md" <<USAGE
          # go-face-recognition ${VERSION}${SUFFIX} (${DOCKER_PLATFORM})

          This tarball contains a statically-linked go-face-recognition
          binary plus all data files required to run the example
          classification pipeline out of the box. No Docker, no CGo
          toolchain, no dlib system package needed on the host — the
          binary is linked against a \`libdlib.a\` static archive from
          upstream \`ghcr.io/andriykalashnykov/dlib-docker\`.

          Run the baked-in example:

              ./main

          It will load every subdirectory of \`persons/\` as a labeled
          identity, detect + classify faces in \`images/unknown.jpg\`,
          and write an annotated \`images/result.jpg\`.

          To run against your own data, replace the contents of
          \`persons/\` and \`images/unknown.jpg\` before invoking
          \`./main\`. The \`models/\` directory holds the pre-trained
          dlib ResNet + shape-predictor weights and should not be
          modified.

          See https://github.com/AndriyKalashnykov/go-face-recognition
          for full documentation.
          USAGE

            # Deterministic, reproducible tarball:
            #   --sort=name      stable file ordering
            #   --owner=0 --group=0 --numeric-owner  zeroed ownership
            #   --mtime=@0       zero mtimes (Unix epoch)
            #   gzip -n          strip gzip header timestamp + filename
            #
            # This lets downstream consumers re-extract from the image
            # digest and verify sha256 matches checksums.txt byte-for-byte.
            TARBALL="artifacts/go-face-recognition_${VERSION}_linux_${ASSET_ARCH}${SUFFIX}.tar.gz"
            tar --sort=name \
                --owner=0 --group=0 --numeric-owner \
                --mtime='@0' \
                -C "$(dirname "${STAGE}")" \
                -cf - "$(basename "${STAGE}")" \
              | gzip -n > "${TARBALL}"

            rm -rf "${STAGE}"
            echo "built ${TARBALL} ($(stat -c '%s' "${TARBALL}") bytes)"
          done

          echo
          echo "=== tarballs for lineage dlib${{ matrix.dlib_major }} ==="
          find artifacts -maxdepth 1 -type f -printf '%s\t%p\n'

      - name: Upload lineage tarballs
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: release-tarballs-dlib${{ matrix.dlib_major }}
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ==================================================================
  # release-artifacts-publish — tag-gated
  #
  # Downloads every tarball from every lineage of release-artifacts-
  # extract, produces a single checksums.txt covering all 6 tarballs,
  # cosign-blob-signs the checksums file with GitHub OIDC keyless
  # signing (same chain of trust as the image signing above), creates
  # a GitHub Release if one does not already exist for this tag, and
  # uploads everything.
  #
  # Users verify with:
  #   curl -LO .../checksums.txt.pem .../checksums.txt.sig .../checksums.txt
  #   cosign verify-blob \
  #     --certificate checksums.txt.pem \
  #     --signature   checksums.txt.sig \
  #     --certificate-identity-regexp 'https://github\.com/AndriyKalashnykov/go-face-recognition/.+' \
  #     --certificate-oidc-issuer    https://token.actions.githubusercontent.com \
  #     checksums.txt
  #   sha256sum -c checksums.txt --ignore-missing
  # ==================================================================
  release-artifacts-publish:
    needs: [release-artifacts-extract]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # gh release create + upload
      id-token: write   # cosign keyless OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all lineage tarballs
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: release-tarballs-*
          merge-multiple: true
          path: artifacts

      - name: Generate checksums.txt
        working-directory: artifacts
        run: |
          set -euo pipefail
          # LC_ALL=C sort keeps the ordering stable across locales.
          sha256sum -- ./*.tar.gz | LC_ALL=C sort > checksums.txt
          # Strip the leading ./ from filenames so the checksum file
          # matches the plain names users get after `curl -LO`.
          sed -i 's| \./| |' checksums.txt
          echo
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign checksums with cosign (keyless OIDC)
        working-directory: artifacts
        run: |
          set -euo pipefail
          # cosign v3.x defaults to --new-bundle-format which emits a
          # single `*.sigstore.json` instead of separate .sig + .pem
          # files, and silently ignores --output-signature /
          # --output-certificate. Force the legacy dual-file output so
          # downstream consumers verifying with the older
          #
          #   cosign verify-blob --certificate ... --signature ... file
          #
          # flow (documented in README) still work without pulling a
          # bundle-format-aware cosign.
          cosign sign-blob --yes \
            --new-bundle-format=false \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt
          echo
          echo "=== signed release bundle ==="
          ls -la

      - name: Create GitHub Release (if not already present)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — will upload assets to it"
          else
            echo "Creating release ${TAG}"
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --verify-tag \
              --generate-notes \
              --title "${TAG}"
          fi

      - name: Upload release assets
        working-directory: artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          gh release upload "${TAG}" \
            --repo "${{ github.repository }}" \
            --clobber \
            -- \
            *.tar.gz checksums.txt checksums.txt.sig checksums.txt.pem
          echo
          echo "=== release assets uploaded to ${TAG} ==="
          gh release view "${TAG}" --repo "${{ github.repository }}" \
            --json assets --jq '.assets[] | "\(.name) (\(.size) bytes)"'
